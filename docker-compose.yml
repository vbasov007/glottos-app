# Combined deployment: glottos-courses + text-tutor in one container.
#
# Build context is the PARENT dir so the image can read both sibling repos.
# TLS is terminated upstream (Cloudflare / LB); this container serves HTTP :80.
# Postgres is external/managed — set DATABASE_URL_COURSES / DATABASE_URL_TUTOR.
#
# First deploy:
#   cp .env.example .env   # then fill it in
#   docker compose build
#   docker compose run --rm courses-db-init   # one-time: create courses tables
#   docker compose up -d                      # tutor self-inits its tables
#
services:
  app:
    build:
      context: ..
      dockerfile: glottos-app/Dockerfile
      args:
        # courses — inlined into the client bundle at build time
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-}
        NEXT_PUBLIC_TUTOR_URL: ${NEXT_PUBLIC_TUTOR_URL:-}
        NEXT_PUBLIC_TMA_DEFAULT_TARGET: ${NEXT_PUBLIC_TMA_DEFAULT_TARGET:-}
        SITE_URL: ${SITE_URL:-}
        # tutor — inlined into the Vite bundle at build time
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        COURSES_URL: ${COURSES_URL:-}
    image: glottos-combined:latest
    restart: unless-stopped
    ports:
      - "80:80"
    env_file: .env
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS -H "Host: ${COURSES_HOST:-courses.glottos.com}" http://127.0.0.1/api/health &&
          curl -fsS -H "Host: ${TUTOR_HOST:-t.glottos.com}" http://127.0.0.1/api/health
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5

  # One-time: apply the glottos-courses schema to the external DB.
  # Reuses the courses build stage (it has the source + dev deps + tsx).
  # Run with:  docker compose run --rm courses-db-init
  courses-db-init:
    profiles: ["init"]
    build:
      context: ..
      dockerfile: glottos-app/Dockerfile
      target: courses-build
    image: glottos-combined-courses-build:latest
    working_dir: /app/web
    environment:
      DATABASE_URL: ${DATABASE_URL_COURSES:-}
    command: ["npm", "run", "db:init"]
