# Single-origin, path-based routing for the merged glottos app — the containerized
# variant of deploy/nginx.conf. Upstreams are docker-compose SERVICE NAMES (not
# 127.0.0.1), resolved on the compose network.
#
#   /            -> tutor   (Express serving the Vite SPA + /api + /s)   :4000
#   /courses     -> courses (Next.js standalone, basePath=/courses)      :8080
#
# One origin => the browser's localStorage['session_id'] (X-Session-Id) is shared
# and both apps read the same `sessions` table: a login in either app signs the
# other in, with no SSO handoff.
#
# Replace glottos.example.com with your real domain. TLS is terminated here; the
# HTTPS block is commented until certbot has written certs into ./certs (mounted
# at /etc/letsencrypt). See DEPLOY_DROPLET.md.

upstream courses_upstream { server courses:8080; }
upstream tutor_upstream   { server tutor:4000; }

server {
    listen 80;
    listen [::]:80;
    server_name glottos.example.com;

    # ACME http-01 challenge (certbot --webroot writes here on the host).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Once TLS is configured, redirect everything else to HTTPS ---------
    # (uncomment the next line AND the 443 server block below, then reload)
    # location / { return 301 https://$host$request_uri; }

    client_max_body_size 50m;   # tutor OCR uploads + large state blobs
    proxy_read_timeout 120s;    # long LLM/TTS calls

    location /courses {
        proxy_pass http://courses_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    location / {
        proxy_pass http://tutor_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

