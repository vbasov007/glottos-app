# Single-origin, path-based routing for the merged glottos app.
#
#   /            -> tutor  (Express serving the Vite SPA + its /api + /s)   :4000
#   /courses     -> courses (Next.js standalone, basePath=/courses)         :8080
#
# Because both apps are served from ONE origin, the browser's
# localStorage['session_id'] (sent as X-Session-Id) is shared between them and
# both read the same `sessions` table — so a login in either app authenticates
# the other with no SSO handoff. TLS is terminated here (or by an upstream LB).

upstream courses_upstream { server 127.0.0.1:8080; }
upstream tutor_upstream   { server 127.0.0.1:4000; }

server {
    listen 80;
    server_name glottos.example.com;

    # --- Redirect to HTTPS in production (uncomment when TLS is configured) ---
    # return 301 https://$host$request_uri;
    # }
    # server {
    #     listen 443 ssl http2;
    #     server_name glottos.example.com;
    #     ssl_certificate     /etc/letsencrypt/live/glottos.example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/glottos.example.com/privkey.pem;

    client_max_body_size 50m;         # tutor OCR uploads + large state blobs
    proxy_read_timeout 120s;          # long LLM/TTS calls

    # ---- courses (Next.js) under /courses -------------------------------
    # Next's basePath=/courses means every courses page, /courses/api/* route,
    # and /courses/_next/* asset lives under this prefix, so one location
    # captures the whole app.
    location /courses {
        proxy_pass http://courses_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # ---- tutor (Express + SPA) at the root ------------------------------
    # Owns /, /api/*, /s/:code, /embed, /admin, /monitoring, and all Vite assets.
    location / {
        proxy_pass http://tutor_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
