server {
    server_name t.glottos.com;

    set $upstream_app  https://text-tutor-app-fm6te.ondigitalocean.app;
    set $upstream_host text-tutor-app-fm6te.ondigitalocean.app;

    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    proxy_ssl_server_name on;
    proxy_ssl_name $upstream_host;

    # OCR uploads send base64-encoded images; default 1m would 413 anything
    # but tiny screenshots. 25m matches the Express body limit with headroom
    # for base64 inflation. Applies to all locations in this server block.
    client_max_body_size 25m;

    location / {
        proxy_pass $upstream_app;
        proxy_http_version 1.1;

        proxy_set_header Host $upstream_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/t.glottos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t.glottos.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name t.glottos.com;

    return 301 https://$host$request_uri;
}
